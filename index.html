<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수평선 너머</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader">
            <div class="wave"></div>
            <p>바다를 불러오는 중...</p>
        </div>
    </div>

    <div id="app">
        <header>
            <h1>수평선 너머</h1>
            <p class="subtitle">수평선 너버 바다 속 나의 기록들</p>
            <div class="auth-box">
                <button id="login-btn" onclick="openModal()">관리자 로그인</button>
                <button id="logout-btn" onclick="logout()" style="display:none;">로그아웃</button>
            </div>
        </header>

        <main>
            <section id="write-section" style="display: none;">
                <h3>새로운 기록 남기기</h3>
                <input type="text" id="post-title" placeholder="제목을 입력하세요...">
                <textarea id="post-content" rows="6" placeholder="수평선 너머의 이야기를 적어주세요..."></textarea>
                <button onclick="savePost()">기록하기</button>
            </section>

            <section id="posts-section">
                <h2>기록된 바다</h2>
                <div id="posts-container">
                    </div>
            </section>
        </main>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>관리자 인증</h3>
            <input type="text" id="admin-id" placeholder="아이디">
            <input type="password" id="admin-pw" placeholder="비밀번호">
            <div class="modal-buttons">
                <button onclick="login()">로그인</button>
                <button onclick="closeModal()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
