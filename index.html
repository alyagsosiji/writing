<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수평선 너머</title>
    <link rel="icon" href="하은.jpg" type="image/jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader">
            <div class="sun-glow"></div>
            <div class="wave-loading"></div>
            <p>수평선 너머 바다를 불러오는 중...</p>
        </div>
    </div>

    <div class="ocean-background">
        <div class="ocean-deep-water"></div>
        <div class="yoonseul-sunlight"></div>
        <div class="wave-ripple ripple1"></div>
        <div class="wave-ripple ripple2"></div>
        <div class="wave-ripple ripple3"></div>
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="yoonseul-glimmer">
            <feTurbulence type="fractalNoise" baseFrequency="0.02 0.15" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div id="app">
        <div class="mini-audio-player" id="mini-audio-trigger" title="음악 재생 / 일시정지">
    <div class="vinyl-disc">
        <div class="vinyl-groove"></div>
        <div class="vinyl-center-hole"></div>
    </div>
</div>
        <header>
            <h1 class="main-title">수평선 너머</h1>
            <p class="subtitle">노을지는 수평선 너머 바다 속 기록들</p>
            <div class="auth-box">
                <div class="auth-flex">
                    <button id="login-btn" onclick="openModal()">관리자 로그인</button>
                    <div id="admin-menu" style="display: none; gap: 10px;">
                        <button id="init-btn" class="danger-btn" onclick="clearDatabase()">바다 초기화</button>
                        <button id="logout-btn" onclick="logout()">로그아웃</button>
                    </div>
                </div>
            </div>

            <div id="view-tab-container" class="view-tab-container" style="display: none;">
                <button id="tab-posts" class="tab-btn active" onclick="switchView('posts')">🌊 기록된 바다</button>
                <button id="tab-letters" class="tab-btn" onclick="switchView('letters')">✉️ 띄워진 편지</button>
            </div>
        </header>

        <main>
            <section id="write-section" style="display: none;">
                <h3 id="write-title">새로운 기록 남기기</h3>
                <input type="text" id="post-title" placeholder="제목을 입력하세요...">
                <textarea id="post-content" rows="8" placeholder="수평선 너머의 이야기를 적어주세요..."></textarea>
                <div class="write-buttons">
                    <button id="submit-post-btn" onclick="savePost()">기록하기</button>
                    <button id="cancel-edit-btn" class="cancel-btn" onclick="cancelEdit()" style="display:none;">수정 취소</button>
                </div>
            </section>

            <section id="letter-section">
                <h3>바다에 편지 띄우기</h3>
                <input type="text" id="letter-title" placeholder="편지 제목을 입력하세요...">
                <textarea id="letter-content" rows="5" placeholder="아시 님에게 전할 따뜻한 편지를 적어주세요. 본인이 누군지 밝혀주면 더 좋아요.. 기록된 바다에는 아시 님만 작성 가능해요... 편지 작성 후 편지를 보내신다면 편지 내용이 글 작성 소재로 참고 됨에 동의하심으로 간주됩니다...."></textarea>
                <div class="write-buttons">
                    <button id="submit-letter-btn" onclick="saveLetter()">편지 보내기</button>
                </div>
            </section>

            <section id="posts-section">
                <h2 id="section-main-title" class="centered-title">기록된 바다</h2>
                <p>아래 바다에 기록된 글들을 클릭하여 읽어주세요!</p>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="기록의 제목을 검색해보세요..." oninput="handleSearch()">
                </div>
                <div id="posts-container" class="posts-grid"></div>
                <div id="pagination-container" class="pagination"></div>
            </section>
        </main>

        <footer>
            <p>그저 글 기록장 - 수평선 너머의 바다</p><br>
            <p>&copy; 2026. alyagsosiji. & atritime. All Rights Reserved.</p>
        </footer>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>관리자 인증</h3>
            <input type="text" id="admin-id" placeholder="아이디">
            <input type="password" id="admin-pw" placeholder="비밀번호">
            <div class="modal-buttons">
                <button onclick="login()">로그인</button>
                <button onclick="closeModal()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal" onclick="closeDetailModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="detail-popup-header">
                <h3 id="detail-title">제목</h3>
                <span id="detail-date" class="date">날짜</span>
            </div>
            <div class="detail-popup-body">
                <div id="detail-text">본문 내용</div>
            </div>
            <div class="modal-buttons" style="margin-top: 5px;">
                <button onclick="closeDetailModal()">바다로 돌아가기</button>
            </div>
        </div>
    </div>

    <div id="system-modal" class="modal">
        <div class="modal-content system-modal-box">
            <h3 id="system-title">안내</h3>
            <p id="system-message">시스템 메시지 공간</p>
            <div id="system-buttons" class="modal-buttons" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
